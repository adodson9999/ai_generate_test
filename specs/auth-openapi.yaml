paths:
  /auth:
    post:
      summary: Create a new auth token to use for access to the PUT and DELETE /booking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  example: admin
                password:
                  type: string
                  example: password123
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    required: [token]
                    properties:
                      token:
                        type: string
                        minLength: 10
                  - type: object
                    required: [reason]
                    properties:
                      reason:
                        type: string
                        enum: [Bad credentials]
