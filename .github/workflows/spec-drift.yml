name: Spec Drift Detection
on:
  push:
    paths:
      - 'specs/*.yaml'
  pull_request:
    paths:
      - 'specs/*.yaml'

jobs:
  detect-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git diff
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Detect spec changes
        run: node scripts/spec-diff.js origin/main
      - name: Dry-run test regeneration
        run: |
          for spec in $(git diff --name-only origin/main -- specs/*.yaml); do
            echo "Would regenerate tests for: $spec"
            node scripts/regenerate-tests.js --fragment "$spec" --framework playwright --dry-run
          done

